<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — UMAK HUB</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="overlay"></div>

  <nav id="header">
    <h1 id="title"><a href="landingpage.html">UMAK HUB</a></h1>
    <div id="nav-center"></div>
    <a href="landingpage.html" class="btn-primary" style="font-size:.78rem;padding:8px 16px;text-decoration:none;">
      ← Back to Home
    </a>
  </nav>

  <div class="auth-wrap">
    <div style="width:100%;max-width:440px;">
      <div class="auth-back-wrap">
        <a href="landingpage.html" class="auth-back">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
          Back to home
        </a>
      </div>

      <div class="auth-card">
        <!-- Head -->
        <div class="auth-card-head">
          <div class="auth-logo">UMAK <span>HUB</span></div>
          <div class="auth-tagline">Work Immersion Portfolio Platform</div>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- Body -->
        <div class="auth-body">

          <!-- LOGIN PANEL -->
          <div class="auth-panel active" id="panel-login">
            <div class="auth-fgroup">
              <label class="auth-flabel">Email Address</label>
              <input type="email" class="auth-input" id="login-email" placeholder="your@email.com" autocomplete="email"/>
            </div>
            <div class="auth-fgroup">
              <label class="auth-flabel">Password</label>
              <input type="password" class="auth-input" id="login-password" placeholder="Enter your password" autocomplete="current-password"/>
              <div class="auth-forgot"><a href="#" id="forgotLink">Forgot password?</a></div>
            </div>
            <button class="auth-submit" id="login-btn" onclick="handleLogin()">
              <div class="spinner"></div>
              <span class="btn-text">Sign In</span>
            </button>
            <div class="auth-err" id="login-err"></div>
            <div class="auth-success" id="login-success"></div>
            <p class="auth-foot-note">Don't have an account? <a href="#" onclick="switchTab('signup');return false;">Sign up</a></p>
          </div>

          <!-- SIGNUP PANEL -->
          <div class="auth-panel" id="panel-signup">
            <div class="auth-fgroup">
              <label class="auth-flabel">Email Address</label>
              <input type="email" class="auth-input" id="signup-email" placeholder="your@email.com" autocomplete="email"/>
            </div>
            <div class="auth-fgroup">
              <label class="auth-flabel">Password</label>
              <input type="password" class="auth-input" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
              <div class="pw-strength" id="pw-strength">
                <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-fill"></div></div>
                <div class="pw-strength-text" id="pw-text"></div>
              </div>
            </div>
            <div class="auth-fgroup">
              <label class="auth-flabel">Confirm Password</label>
              <input type="password" class="auth-input" id="signup-confirm" placeholder="Re-enter your password" autocomplete="new-password"/>
            </div>
            <button class="auth-submit" id="signup-btn" onclick="handleSignup()">
              <div class="spinner"></div>
              <span class="btn-text">Create Account</span>
            </button>
            <div class="auth-err" id="signup-err"></div>
            <div class="auth-success" id="signup-success"></div>
            <p class="auth-foot-note">Already have an account? <a href="#" onclick="switchTab('login');return false;">Sign in</a></p>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js';
    import { redirectIfAuth } from './auth.js';

    // If already logged in, redirect to dashboard
    redirectIfAuth();

    // Tab from URL param
    const tab = new URLSearchParams(location.search).get('tab');
    if (tab === 'signup') switchTab('signup');

    window.switchTab = function(t) {
      document.querySelectorAll('.auth-tab').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.auth-panel').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('panel-' + t).classList.add('active');
    };

    function setLoading(btnId, on) {
      const btn = document.getElementById(btnId);
      btn.classList.toggle('loading', on);
      btn.disabled = on;
    }
    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 5000);
    }
    function showOk(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.add('show');
    }

    window.handleLogin = async function() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showErr('login-err', 'Please fill in all fields.'); return; }
      setLoading('login-btn', true);
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { setLoading('login-btn', false); showErr('login-err', error.message); return; }
      // Check if profile exists
      const { data: profile } = await supabase.from('profiles').select('id').eq('id', data.user.id).single();
      window.location.replace(profile ? 'dashboard.html' : 'profile-setup.html');
    };

    window.handleSignup = async function() {
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm  = document.getElementById('signup-confirm').value;
      if (!email || !password || !confirm) { showErr('signup-err', 'Please fill in all fields.'); return; }
      if (password.length < 6) { showErr('signup-err', 'Password must be at least 6 characters.'); return; }
      if (password !== confirm) { showErr('signup-err', 'Passwords do not match.'); return; }
      setLoading('signup-btn', true);
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) { setLoading('signup-btn', false); showErr('signup-err', error.message); return; }
      // If email confirmation is disabled in Supabase, session will be set immediately
      if (data.session) {
        window.location.replace('profile-setup.html');
      } else {
        setLoading('signup-btn', false);
        showOk('signup-success', '✓ Check your email to confirm your account, then sign in.');
      }
    };

    window.checkStrength = function(val) {
      const el = document.getElementById('pw-strength');
      const fill = document.getElementById('pw-fill');
      const txt  = document.getElementById('pw-text');
      if (!val) { el.style.display = 'none'; return; }
      el.style.display = 'block';
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w:'15%', c:'#ff4466', t:'Too short' },
        { w:'30%', c:'#ff8844', t:'Weak' },
        { w:'55%', c:'var(--amber)', t:'Fair' },
        { w:'75%', c:'#80cc44', t:'Good' },
        { w:'100%',c:'var(--green)', t:'Strong' },
      ];
      const l = levels[Math.min(score, 4)];
      fill.style.width = l.w; fill.style.background = l.c;
      txt.textContent = l.t; txt.style.color = l.c;
    };

    // Forgot password
    document.getElementById('forgotLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      if (!email) { showErr('login-err', 'Enter your email first, then click Forgot Password.'); return; }
      const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/loginsignup.html' });
      if (error) { showErr('login-err', error.message); }
      else { showOk('login-success', '✓ Password reset email sent. Check your inbox.'); }
    });

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('panel-login').classList.contains('active')) handleLogin();
        else handleSignup();
      }
    });
  </script>
</body>
</html>
