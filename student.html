<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Student — G12-01CPG</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="overlay"></div>

  <nav id="header">
    <h1 id="title"><a href="index.html">UMAK HUB</a></h1>
    <div id="nav-center">
      <a href="index.html"    class="navs">ʜᴏᴍᴇ</a>
      <a href="aboutus.html"  class="navs">ᴀʙᴏᴜᴛ ᴜꜱ</a>
      <a href="members.html"  class="navs">ᴍᴇᴍʙᴇʀꜱ</a>
      <a href="progress.html" class="navs">ᴘʀᴏɢʀᴇꜱꜱ</a>
    </div>
    <button id="cta-btn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      UPDATE
    </button>
    <button id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-drawer" id="mobileDrawer" aria-hidden="true">
    <div class="drawer-inner">
      <a href="index.html"    onclick="closeMenu(event)">ʜᴏᴍᴇ</a>
      <a href="aboutus.html"  onclick="closeMenu(event)">ᴀʙᴏᴜᴛ ᴜꜱ</a>
      <a href="members.html"  onclick="closeMenu(event)">ᴍᴇᴍʙᴇʀꜱ</a>
      <a href="progress.html" onclick="closeMenu(event)">ᴘʀᴏɢʀᴇꜱꜱ</a>
      <div class="drawer-divider"></div>
      <button class="btn-drawer" onclick="closeMenu(event); openModal();">+ UPDATE HOURS</button>
    </div>
  </div>
  <div class="nav-backdrop" id="navBackdrop"></div>

  
  <!-- Content injected by script.js -->
  <div class="page-wrap" id="page-content"></div>

  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-head-title">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l4 2"/></svg>
          <span id="modalTitle">ADD IMMERSION HOURS</span>
        </div>
        
      </div>
      <div class="modal-body">
        <div class="frow">
          <div class="fgroup">
            <label class="flabel" for="logDate">Date</label>
            <input class="finput" type="date" id="logDate"/>
          </div>
          <div class="fgroup">
            <label class="flabel" for="logHours">Hours Rendered</label>
            <div class="hours-group">
              <input class="finput" type="number" id="logHours" min="0.5" max="12" step="0.5" placeholder="8"/>
              <span class="hours-unit">hrs</span>
            </div>
            <div class="field-err" id="hrsErr">Please enter valid hours (0.5–12).</div>
          </div>
        </div>
        <div class="fgroup">
          <label class="flabel" for="logTask">Task Description</label>
          <input class="finput" type="text" id="logTask" placeholder="What did you work on today?"/>
        </div>
        <div class="fgroup fgroup--last">
          <label class="flabel" for="logNotes">Notes (optional)</label>
          <textarea class="ftextarea" id="logNotes" placeholder="Task Description"></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-danger" id="modalCancel">ᴄʟᴏꜱᴇ</button>
        <button class="btn-success" id="modalSubmit">ꜱᴜʙᴍɪᴛ</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <div class="toast-dot"></div>
    <span id="toastMsg">Hours logged!</span>
  </div>

  <footer>
    <p>G12-01CPG · <span>University of Makati </span> · Work Immersion Portfolio <span id="year"></span></p>
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
